<div class="giscus-container">
    <script src="https://giscus.app/client.js"
            data-repo="QwQBiG/QwQBiG.github.io"
            data-repo-id="R_kgDOQUrNow"
            data-category="Announcements"
            data-category-id="DIC_kwDOQUrNo84Cxx1C"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="preferred_color_scheme"
            data-lang="zh-CN"
            crossorigin="anonymous"
            async>
    </script>
</div>

<script>
    // Giscus 主题切换
    function updateGiscusTheme() {
        const iframe = document.querySelector('.giscus-frame');
        if (!iframe) return;
        
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const theme = currentTheme === 'dark' ? 'dark' : 'light';
        
        try {
            iframe.contentWindow.postMessage({
                giscus: {
                    setConfig: {
                        theme: theme
                    }
                }
            }, 'https://giscus.app');
        } catch (e) {
            console.log('Giscus theme update failed:', e);
        }
    }
    
    // 监听主题变化
    const themeObserver = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === 'data-theme') {
                updateGiscusTheme();
            }
        });
    });
    
    themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-theme']
    });
    
    // 初始化 Giscus
    function initGiscus() {
        const iframe = document.querySelector('.giscus-frame');
        if (iframe) {
            // iframe 已存在，更新主题
            updateGiscusTheme();
        } else {
            // iframe 还没加载，继续等待
            setTimeout(initGiscus, 300);
        }
    }
    
    // 页面加载完成后开始检查
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initGiscus);
    } else {
        initGiscus();
    }
    
    // 监听 giscus 加载完成事件
    window.addEventListener('message', (event) => {
        if (event.origin !== 'https://giscus.app') return;
        
        if (event.data && event.data.giscus) {
            // giscus 已加载或调整大小，更新主题
            if (event.data.giscus.resizeHeight || event.data.giscus.discussion) {
                updateGiscusTheme();
            }
        }
    });
</script>
